name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid stomping in-flight deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Pages serves the site at /<repo-name>/ — Vite needs that as base.
          VITE_BASE: /${{ github.event.repository.name }}/
          # The WASM/JS assets are vendored into public/ (committed); don't
          # try to source them from a sibling structurize checkout in CI.
          SKIP_COPY_ASSETS: '1'
        run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

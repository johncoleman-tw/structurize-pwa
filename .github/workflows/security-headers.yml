name: Security headers check

on:
  # Run automatically after the Deploy workflow finishes — we want this
  # information regardless of whether the deploy succeeded.
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]
  # Allow manual re-runs without redeploying.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Informational only — never block anything.
    continue-on-error: true
    steps:
      - name: Inspect response headers on the deployed URL
        env:
          URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          set -uo pipefail

          echo "Fetching headers from $URL"
          # -I = HEAD request, -s = silent, -L = follow redirects.
          curl -sIL "$URL" -o /tmp/headers.raw
          echo "── Raw response headers ─────────────────────────────────"
          cat /tmp/headers.raw
          echo "─────────────────────────────────────────────────────────"

          # Helper: case-insensitive grep for a header, return its value
          # (everything after the first colon, trimmed). Empty string if absent.
          hdr() {
            local name="$1"
            grep -i "^${name}:" /tmp/headers.raw | head -1 \
              | sed -E "s/^[^:]+:[[:space:]]*//; s/[[:space:]]+$//" \
              || true
          }

          # Mark a header as set (✓), missing (✗), or "via meta tag" for the
          # ones we know GitHub Pages won't emit but our HTML carries.
          present() { [ -n "$1" ] && echo "✓" || echo "✗"; }

          STATUS=$(awk '/^HTTP/ {code=$2} END {print code}' /tmp/headers.raw)
          CSP=$(hdr 'content-security-policy')
          HSTS=$(hdr 'strict-transport-security')
          XCTO=$(hdr 'x-content-type-options')
          XFO=$(hdr 'x-frame-options')
          REFERRER=$(hdr 'referrer-policy')
          PERMS=$(hdr 'permissions-policy')

          # CSP via meta tag — pull it out of the page body if no header.
          META_CSP=""
          if [ -z "$CSP" ]; then
            curl -sL "$URL" -o /tmp/page.html
            META_CSP=$(grep -oE '<meta[^>]+Content-Security-Policy[^>]+>' /tmp/page.html | head -1 || true)
          fi

          {
            echo "## Security headers — \`$URL\`"
            echo ""
            echo "Final HTTP status: \`$STATUS\`"
            echo ""
            echo "| Header | Status | Value |"
            echo "|---|---|---|"
            if [ -n "$CSP" ]; then
              echo "| Content-Security-Policy | ✓ header | \`$(echo "$CSP" | head -c 80)…\` |"
            elif [ -n "$META_CSP" ]; then
              echo "| Content-Security-Policy | ✓ via meta tag | (in HTML head) |"
            else
              echo "| Content-Security-Policy | ✗ | — |"
            fi
            echo "| Strict-Transport-Security | $(present "$HSTS") | \`${HSTS:-—}\` |"
            echo "| X-Content-Type-Options    | $(present "$XCTO") | \`${XCTO:-—}\` |"
            echo "| X-Frame-Options           | $(present "$XFO")  | \`${XFO:-—}\` |"
            echo "| Referrer-Policy           | $(present "$REFERRER") | \`${REFERRER:-—}\` |"
            echo "| Permissions-Policy        | $(present "$PERMS") | \`${PERMS:-—}\` |"
            echo ""

            echo "### Notes"
            echo ""
            echo "- **GitHub Pages does not allow custom HTTP headers.** Anything missing as a"
            echo "  real header above is structural — moving the site behind a custom domain"
            echo "  fronted by Cloudflare / Netlify / etc. would let us add HSTS, X-Frame-Options,"
            echo "  X-Content-Type-Options, etc."
            echo "- **CSP and Referrer-Policy** are delivered via \`<meta http-equiv>\` in"
            echo "  [index.html](../blob/main/index.html), so they apply at the page level"
            echo "  even though they don't appear as response headers."
            echo ""
            echo "### Manual deeper checks"
            echo ""
            echo "- [Google CSP Evaluator](https://csp-evaluator.withgoogle.com/) — paste the"
            echo "  meta-tag CSP from \`view-source:$URL\` to validate it for known bypass patterns."
            echo "- [securityheaders.com](https://securityheaders.com/?q=$URL&followRedirects=on)"
            echo "  — full path-aware scan (the link above pre-fills the URL)."
            echo "- [Mozilla Observatory](https://developer.mozilla.org/en-US/observatory) — note"
            echo "  this is **host-only** and currently can't scan project-style GitHub Pages"
            echo "  (no site at the bare \`*.github.io\` root). Useful only if you move to a"
            echo "  custom domain or a user-pages repo."
          } >> "$GITHUB_STEP_SUMMARY"

          # Echo to streaming log too.
          echo ""
          echo "CSP header:    $([ -n "$CSP" ] && echo present || ([ -n "$META_CSP" ] && echo "via meta tag" || echo absent))"
          echo "HSTS:          ${HSTS:-absent}"
          echo "X-CT-Options:  ${XCTO:-absent}"
          echo "Referrer:      ${REFERRER:-absent}"

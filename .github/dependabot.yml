version: 2
updates:
  # Auto-PRs for npm dependencies (React, Vite, vite-plugin-pwa, etc.)
  # Security-only updates land immediately; routine version bumps
  # are batched weekly to keep PR noise low.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      build-tooling:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'vite-plugin-*'
          - 'workbox-*'
          - 'typescript'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'

  # Keep GitHub Actions versions current (security patches in actions/*).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
